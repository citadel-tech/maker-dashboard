name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  unix:
    name: Test ${{ matrix.os }} (${{ matrix.rust }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable, beta, nightly]

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      # libtor-src builds libevent + tor from source via autotools.

      - name: Install native build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git autoconf automake libtool pkg-config \
            libssl-dev build-essential cmake file

      - name: Install native build tools (macOS)
        if: runner.os == 'macOS'
        run: brew install automake autoconf libtool pkg-config openssl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose --no-default-features

      - name: Run tests
        run: cargo test --verbose --no-default-features

      - name: Check documentation
        run: cargo doc --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings
