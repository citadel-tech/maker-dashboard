name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch: {}

env:
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the frontend once (architecture-independent) and share it as an
  #    artifact. The backend serves these files from disk at runtime via
  #    ServeDir (default MAKER_DASHBOARD_FRONTEND_PATH = frontend/build/client),
  #    so every release tarball must ship this directory alongside the binary.
  # ---------------------------------------------------------------------------
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/client
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Build the Rust binary per target, then package binary + frontend into a
  #    single self-contained tarball and attach it to a draft GitHub release.
  # ---------------------------------------------------------------------------
  release:
    name: ${{ matrix.target }}
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Native ARM64 runner — no cross-compiling, so libtor builds Tor for
          # the host arch the same way x86_64 does. Free for public repos.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        uses: SebRollen/toml-action@v1.2.0
        with:
          file: Cargo.toml
          field: package.version

      # libtor builds bundled Tor from source — these are its C build deps.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y automake autoconf libtool pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/client

      - name: Package
        id: package
        shell: bash
        run: |
          version="${{ steps.get_version.outputs.value }}"
          name="maker-dashboard-v${version}-${{ matrix.target }}"
          stage="$(mktemp -d)/${name}"
          mkdir -p "$stage/frontend/build"

          cp "target/${{ matrix.target }}/release/maker-dashboard" "$stage/"
          cp -r frontend/build/client "$stage/frontend/build/client"
          cp README.md LICENSE "$stage/"

          # Self-contained: running ./maker-dashboard from the extracted dir
          # resolves the default frontend path (frontend/build/client). install.sh
          # is provided for a system-wide (FHS) install.
          cat > "$stage/install.sh" <<'EOF'
          #!/bin/sh
          set -e
          PREFIX="${PREFIX:-/usr/local}"
          install -Dm755 maker-dashboard "$PREFIX/bin/maker-dashboard"
          rm -rf "$PREFIX/share/maker-dashboard/build/client"
          mkdir -p "$PREFIX/share/maker-dashboard/build"
          cp -r frontend/build/client "$PREFIX/share/maker-dashboard/build/client"
          echo "Installed maker-dashboard to $PREFIX/bin"
          echo "Run with:"
          echo "  MAKER_DASHBOARD_FRONTEND_PATH=$PREFIX/share/maker-dashboard/build/client maker-dashboard"
          EOF
          chmod +x "$stage/install.sh"

          tarball="${name}.tar.gz"
          tar -czvf "$tarball" -C "$(dirname "$stage")" "$name"
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.tarball }}

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ steps.package.outputs.tarball }}
