name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - v[0-9]+.*
  workflow_dispatch: {}

env:
  CARGO_INCREMENTAL: 0

jobs:
  # ---------------------------------------------------------------------------
  # 1. Build the frontend once (architecture-independent) and share it as an
  #    artifact. Each platform job downloads it into frontend/build/client so
  #    `--features embed-frontend` can compile it into the binary.
  # ---------------------------------------------------------------------------
  frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/client
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Per-target: build a self-contained binary (frontend embedded) and
  #    produce a tarball plus a native package (.deb on Linux, .pkg on macOS).
  # ---------------------------------------------------------------------------
  release:
    name: ${{ matrix.target }}
    needs: frontend
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Native ARM64 runner — no cross-compiling, so libtor builds Tor for
          # the host arch the same way x86_64 does. Free for public repos.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-13 # Intel runner
            target: x86_64-apple-darwin
          - os: macos-latest # Apple Silicon runner
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        uses: SebRollen/toml-action@v1.2.0
        with:
          file: Cargo.toml
          field: package.version

      # libtor builds bundled Tor from source — these are its C build deps.
      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y automake autoconf libtool pkg-config libssl-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install automake autoconf libtool pkg-config openssl

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Must happen BEFORE the build: rust-embed reads frontend/build/client at
      # compile time when the embed-frontend feature is on.
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/client

      - name: Build binary (frontend embedded)
        run: cargo build --release --locked --target ${{ matrix.target }} --features embed-frontend

      - name: Package tarball
        id: tarball
        shell: bash
        run: |
          version="${{ steps.get_version.outputs.value }}"
          name="maker-dashboard-v${version}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp "target/${{ matrix.target }}/release/maker-dashboard" "dist/$name/"
          cp README.md LICENSE "dist/$name/"
          tar -czvf "$name.tar.gz" -C dist "$name"
          echo "file=$name.tar.gz" >> "$GITHUB_OUTPUT"

      # --- Debian package -----------------------------------------------------
      - name: Install cargo-deb
        if: runner.os == 'Linux'
        run: cargo install cargo-deb --locked

      - name: Build .deb
        if: runner.os == 'Linux'
        run: cargo deb --no-build --no-strip --target ${{ matrix.target }} --output .

      # --- macOS installer package -------------------------------------------
      - name: Build .pkg
        if: runner.os == 'macOS'
        shell: bash
        run: |
          version="${{ steps.get_version.outputs.value }}"
          root="$(mktemp -d)/root"
          mkdir -p "$root/usr/local/bin"
          cp "target/${{ matrix.target }}/release/maker-dashboard" "$root/usr/local/bin/"
          pkgbuild \
            --root "$root" \
            --identifier tech.citadel.maker-dashboard \
            --version "$version" \
            --install-location / \
            "maker-dashboard-v${version}-${{ matrix.target }}.pkg"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.deb
            *.pkg

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            *.tar.gz
            *.deb
            *.pkg
